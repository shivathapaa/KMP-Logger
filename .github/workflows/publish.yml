name: Publish

on:
  release:
    types: [ released, prereleased ]

jobs:
  test:
    name: Run tests
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run all tests
        run: ./gradlew allTests --continue -x jsBrowserTest -x wasmJsBrowserTest

  publish:
    name: Release build and publish
    needs: test
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Validate version matches release tag
        run: |
          VERSION=$(grep '^version = ' logger/build.gradle.kts | sed 's/version = "//;s/"//')
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Version mismatch: build.gradle.kts has '$VERSION' but release tag is '$TAG'"
            exit 1
          fi
          echo "Version check passed: $VERSION"

      - name: Publish to MavenCentral
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}