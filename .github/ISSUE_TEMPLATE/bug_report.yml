name: Bug Report
description: Report a bug encountered while using KMP-Logger
title: "[Bug]: "
labels: ["bug"]
assignees: ["shivathapaa"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I call `Log.e(...)` with a throwable, the stack trace is missing from the output.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Configure the logger with `Logger.install { ... }`
        2. Call `Log.e("tag", throwable) { "message" }`
        3. Observe output - stack trace not present
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error output or logs.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: KMP-Logger version
      description: Which version of the library are you using?
      placeholder: "1.3.0"
    validations:
      required: true

  - type: checkboxes
    id: platforms
    attributes:
      label: Affected platform(s)
      description: Select all platforms where you can reproduce the issue.
      options:
        - label: Android
        - label: iOS
        - label: macOS
        - label: watchOS
        - label: tvOS
        - label: JVM (desktop / server)
        - label: JS (Node.js)
        - label: JS (Browser)
        - label: Wasm/JS
        - label: Linux
        - label: MinGW (Windows)
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal reproducible example
      description: A short code snippet that demonstrates the issue.
      render: kotlin

  - type: input
    id: kotlin-version
    attributes:
      label: Kotlin version
      placeholder: "2.1.0"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might help - stack traces, screenshots, related issues.